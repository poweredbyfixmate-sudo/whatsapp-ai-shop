<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<!-- ===================== SEO ===================== -->
<title>WhatsApp AI Shop — Order Groceries Instantly on WhatsApp</title>
<meta name="description" content="WhatsApp AI Shop is a simple AI-style grocery ordering app. Browse rice, oil, snacks, dairy & household items and send your order straight to WhatsApp — no signup, no OTP, no app install." />
<meta name="keywords" content="grocery shopping, WhatsApp order, local grocery store, Coimbatore grocery, online kirana, AI shop, WhatsApp AI Shop" />
<meta name="author" content="WhatsApp AI Shop" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://whatsappaishop.example.com/" />

<!-- ===================== Open Graph ===================== -->
<meta property="og:type" content="website" />
<meta property="og:title" content="WhatsApp AI Shop — Order Groceries Instantly on WhatsApp" />
<meta property="og:description" content="Browse groceries and send your order straight to WhatsApp. No signup, no OTP, no address forms." />
<meta property="og:image" content="./icon-512.png" />
<meta property="og:url" content="https://whatsappaishop.example.com/" />
<meta property="og:site_name" content="WhatsApp AI Shop" />

<!-- ===================== Twitter ===================== -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="WhatsApp AI Shop — Order Groceries Instantly on WhatsApp" />
<meta name="twitter:description" content="Browse groceries and send your order straight to WhatsApp. No signup, no OTP, no address forms." />
<meta name="twitter:image" content="./icon-512.png" />

<!-- ===================== PWA ===================== -->
<meta name="theme-color" content="#25D366" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2325D366'/%3E%3Ctext x='50' y='64' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E🛒%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2325D366'/%3E%3Ctext x='50' y='64' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E🛒%3C/text%3E%3C/svg%3E" />

<link rel="stylesheet" href="./style.css" />
</head>
<body>

<!-- ============================================================
     TOP APP BAR
     ============================================================ -->
<header class="app-bar" id="appBar">
  <div class="app-bar__brand">
    <div class="app-bar__logo" aria-hidden="true">🛒</div>
    <div class="app-bar__title-group">
      <h1 class="app-bar__title">WhatsApp AI Shop</h1>
      <p class="app-bar__subtitle">Fresh groceries, delivered via chat</p>
    </div>
  </div>

  <div class="app-bar__actions">
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
      <span id="themeIcon">🌙</span>
    </button>
    <button class="icon-btn icon-btn--cart" id="cartIconBtn" aria-label="Open cart" title="Cart">
      🛍️
      <span class="badge" id="cartBadge" hidden>0</span>
    </button>
  </div>
</header>

<!-- Search bar (own row for comfortable mobile tapping) -->
<div class="search-row">
  <div class="search-box">
    <span class="search-box__icon" aria-hidden="true">🔍</span>
    <input
      type="text"
      id="searchInput"
      class="search-box__input"
      placeholder="Search rice, milk, oil, biscuits..."
      autocomplete="off"
      inputmode="search"
    />
    <button class="search-box__clear" id="searchClear" hidden aria-label="Clear search">✕</button>
  </div>
</div>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<main id="mainContent">

  <!-- AI Assistant chat bubble -->
  <section class="ai-assistant" id="aiAssistant" aria-live="polite">
    <div class="ai-assistant__avatar">🤖</div>
    <div class="ai-assistant__bubble">
      <p class="ai-assistant__text" id="aiTypingText"></p>
      <div class="ai-assistant__chips" id="aiChips" hidden>
        <button class="chip" data-suggest="rice">🍚 Rice</button>
        <button class="chip" data-suggest="milk">🥛 Milk</button>
        <button class="chip" data-suggest="oil">🛢 Oil</button>
        <button class="chip" data-suggest="biscuits">🍪 Biscuits</button>
        <button class="chip" data-suggest="household">🧼 Household</button>
      </div>
    </div>
  </section>

  <!-- Category chip rail -->
  <nav class="category-rail" id="categoryRail" aria-label="Categories"></nav>

  <!-- Search results heading (hidden unless searching) -->
  <div class="section-heading" id="searchHeading" hidden>
    <h2 id="searchHeadingText">Results</h2>
    <span class="section-heading__count" id="searchCount"></span>
  </div>

  <!-- Popular products -->
  <section class="rail-section" id="popularSection">
    <div class="section-heading">
      <h2>🔥 Popular Products</h2>
    </div>
    <div class="h-scroll" id="popularRail"></div>
  </section>

  <!-- Recently added -->
  <section class="rail-section" id="recentSection">
    <div class="section-heading">
      <h2>🆕 Recently Added</h2>
    </div>
    <div class="h-scroll" id="recentRail"></div>
  </section>

  <!-- Quick reorder -->
  <section class="rail-section" id="reorderSection" hidden>
    <div class="section-heading">
      <h2>⏱️ Quick Reorder</h2>
      <span class="section-heading__link" id="clearHistoryBtn">clear</span>
    </div>
    <div class="h-scroll" id="reorderRail"></div>
  </section>

  <!-- Category product grids -->
  <div id="categoryGrids"></div>

</main>

<!-- ============================================================
     FLOATING WHATSAPP BUTTON
     ============================================================ -->
<a
  href="#"
  class="fab-whatsapp"
  id="fabWhatsapp"
  aria-label="Chat with us on WhatsApp"
  title="Chat on WhatsApp"
>
  <svg viewBox="0 0 32 32" width="28" height="28" fill="currentColor" aria-hidden="true">
    <path d="M16.02 3C9.4 3 4 8.4 4 15.02c0 2.36.66 4.56 1.8 6.44L4 29l7.73-1.77a11.9 11.9 0 0 0 4.29.8h.01c6.62 0 12.02-5.4 12.02-12.02C28.05 8.4 22.65 3 16.02 3zm0 21.86c-1.5 0-2.98-.4-4.27-1.16l-.31-.18-4.58 1.05 1.08-4.47-.2-.32a9.83 9.83 0 0 1-1.5-5.26c0-5.45 4.44-9.89 9.9-9.89 5.44 0 9.88 4.44 9.88 9.9 0 5.45-4.44 9.33-10 9.33zm5.42-7.4c-.3-.15-1.75-.86-2.02-.96-.27-.1-.47-.15-.66.15-.2.3-.76.96-.93 1.16-.17.2-.34.22-.64.08-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.48-1.76-1.66-2.06-.17-.3-.02-.46.13-.61.14-.14.3-.34.45-.51.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.66-1.6-.9-2.18-.24-.58-.48-.5-.66-.5-.17 0-.37-.02-.57-.02-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.07 2.87 1.22 3.07.15.2 2.1 3.2 5.08 4.49.71.3 1.26.49 1.69.62.71.23 1.36.2 1.87.12.57-.08 1.75-.71 2-1.4.24-.68.24-1.27.17-1.4-.07-.12-.27-.2-.57-.35z"/>
  </svg>
</a>

<!-- ============================================================
     BOTTOM CART BAR (collapsed summary)
     ============================================================ -->
<div class="cart-bar" id="cartBar" hidden>
  <div class="cart-bar__info">
    <span class="cart-bar__count" id="cartBarCount">0 items</span>
    <span class="cart-bar__total" id="cartBarTotal">₹0</span>
  </div>
  <button class="btn btn--primary" id="viewCartBtn">View Cart ›</button>
</div>

<!-- ============================================================
     CART DRAWER (slide up sheet)
     ============================================================ -->
<div class="sheet-overlay" id="cartOverlay" hidden></div>
<div class="sheet" id="cartSheet" hidden>
  <div class="sheet__handle"></div>
  <div class="sheet__header">
    <h2>Your Cart</h2>
    <button class="icon-btn" id="closeCartBtn" aria-label="Close cart">✕</button>
  </div>

  <div class="sheet__body" id="cartItemsWrap">
    <div class="empty-state" id="cartEmptyState">
      <div class="empty-state__emoji">🛒</div>
      <p>Your cart is empty. Add something tasty!</p>
    </div>
    <ul class="cart-list" id="cartList"></ul>
  </div>

  <div class="sheet__footer" id="cartFooter" hidden>
    <div class="cart-summary">
      <div class="cart-summary__row">
        <span>Subtotal</span>
        <span id="cartSubtotal">₹0</span>
      </div>
      <div class="cart-summary__row cart-summary__row--total">
        <span>Total</span>
        <span id="cartTotal">₹0</span>
      </div>
    </div>
    <div class="sheet__actions">
      <button class="btn btn--ghost" id="clearCartBtn">Clear Cart</button>
      <button class="btn btn--primary" id="checkoutBtn">Checkout →</button>
    </div>
  </div>
</div>

<!-- ============================================================
     CHECKOUT DRAWER
     ============================================================ -->
<div class="sheet-overlay" id="checkoutOverlay" hidden></div>
<div class="sheet" id="checkoutSheet" hidden>
  <div class="sheet__handle"></div>
  <div class="sheet__header">
    <h2>Checkout</h2>
    <button class="icon-btn" id="closeCheckoutBtn" aria-label="Close checkout">✕</button>
  </div>

  <div class="sheet__body">
    <label class="field">
      <span class="field__label">Your Name</span>
      <input type="text" id="customerName" class="field__input" placeholder="e.g. Karthik" autocomplete="name" />
    </label>

    <button class="btn btn--location" id="shareLocationBtn">
      📍 Share My Location
    </button>
    <p class="location-status" id="locationStatus"></p>

    <div class="order-preview" id="orderPreview"></div>
  </div>

  <div class="sheet__footer">
    <button class="btn btn--primary btn--full" id="sendWhatsappBtn">
      Send Order on WhatsApp 💬
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="./products.js"></script>
<script src="./script.js"></script>
</body>
</html>
